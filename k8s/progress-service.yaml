apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-service
  namespace: fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: progress-service
  template:
    metadata:
      labels:
        app: progress-service
    spec:
      containers:
        - name: progress-service
          image: victoreze07/progress-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: progress-service
  namespace: fitness
spec:
  selector:
    app: progress-service
  ports:
    - name: http
      port: 4003
      targetPort: 4003
