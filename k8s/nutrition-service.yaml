apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutrition-service
  namespace: fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nutrition-service
  template:
    metadata:
      labels:
        app: nutrition-service
    spec:
      containers:
        - name: nutrition-service
          image: nutrition-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nutrition-service
  namespace: fitness
spec:
  selector:
    app: nutrition-service
  ports:
    - name: http
      port: 4002
      targetPort: 4002
