  </head>
  <body data-page="nutrition">
    <header class="site-header">
      <a class="brand" href="/">FitFlow</a>
      <nav class="site-nav" aria-label="Primary navigation">

        <a href="/nutrition" aria-current="page">Nutrition</a>
